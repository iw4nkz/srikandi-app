<!DOCTYPE html>
<html lang="id">
<head>
  <!-- PWA Manifest & Theme -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SRIKANDI MONITORING UNIT</title>
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/DzWsHG8J/pngwing-com.png">
  
  <style>
    /* Reset & Base Styling */
    html, body { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background-color: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* Iframe Styling */
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    iframe.visible {
      opacity: 1;
    }

    /* Loader Container */
#loader-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
  background: linear-gradient(145deg, #1a1a1a 0%, #141414 30%, #0d1a0d 70%, #0a0f0a 100%);
  transition: opacity 0.4s ease, visibility 0.4s;
}

    #loader-container.hide {
      opacity: 0;
      visibility: hidden;
    }

    /* Logo */
    .loader-logo {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      animation: bounce 2s ease-in-out infinite;
    }

    .loader-logo img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }

    /* Animasi Spinner Ring */
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(46, 204, 113, 0.2);
      border-radius: 50%;
      border-top-color: #2ecc71;
      animation: spin 1s ease-in-out infinite;
      margin-top: 20px;
    }

    /* Teks Loading */
    .loading-text {
      color: #ffffff;
      margin-top: 20px;
      font-size: 1.1rem;
      letter-spacing: 3px;
      font-weight: bold;
    }

    /* Detail Sub-text */
    .loading-subtext {
      color: #2ecc71;
      margin-top: 8px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    /* Loading progress dots */
    .loading-dots {
      margin-top: 15px;
    }
    .loading-dots span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #2ecc71;
      border-radius: 50%;
      margin: 0 3px;
      animation: dotBounce 1.4s infinite ease-in-out;
    }
    .loading-dots span:nth-child(1) { animation-delay: 0s; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* Keyframes Animasi */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1.2); opacity: 1; }
    }
  </style>
</head>
<body>

  <div id="loader-container">
    <div class="loader-logo">
      <img src="https://i.postimg.cc/DzWsHG8J/pngwing-com.png" alt="Logo Srikandi" onerror="this.style.display='none'">
    </div>
    <div class="spinner"></div>
    <div class="loading-text">S R I K A N D I</div>
    <div class="loading-subtext" id="loadingStatus">Menghubungi server...</div>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <iframe 
    id="srikandi-frame" 
    src="https://script.google.com/macros/s/AKfycbxt9O2Xy9DDyLDFHEswyRgvR75fG_zlEfmB_Qvj-1GHXsRIrQXmQgtQg2BLKouszg9HCQ/exec"
    onload="handleIframeLoad()">
  </iframe>

  <script>
    let loaderHidden = false;
    let loadStartTime = Date.now();
    
    // Variasi teks loading biar ga monoton
    const loadingTexts = [
      "Menghubungi server...",
      "Memuat data terbaru...",
      "Menyiapkan dashboard...",
      "Hampir selesai..."
    ];
    let textIndex = 0;
    
    // Rotasi teks loading setiap 2 detik
    const textInterval = setInterval(function() {
      if (!loaderHidden) {
        textIndex = (textIndex + 1) % loadingTexts.length;
        var statusEl = document.getElementById('loadingStatus');
        if (statusEl) statusEl.innerText = loadingTexts[textIndex];
      }
    }, 2000);
    
    function handleIframeLoad() {
      // Tambah delay 1.5 detik setelah iframe load biar GAS internal siap
      setTimeout(function() {
        if (!loaderHidden) {
          hideLoader();
        }
      }, 1500);
    }
    
    function hideLoader() {
      if (loaderHidden) return;
      loaderHidden = true;
      clearInterval(textInterval);
      
      var loader = document.getElementById('loader-container');
      var frame = document.getElementById('srikandi-frame');
      
      loader.classList.add('hide');
      frame.classList.add('visible');
      
      // Hapus loader dari DOM setelah transisi selesai
      setTimeout(function() {
        var loaderEl = document.getElementById('loader-container');
        if (loaderEl) loaderEl.remove();
      }, 500);
    }
    
    // FALLBACK: Maksimal 10 detik loader tetap tampil, paksa hilangin
    setTimeout(function() {
      if (!loaderHidden) {
        console.log("Fallback timeout: memaksa loader hilang");
        hideLoader();
      }
    }, 10000);
    
    // Optional: detect error jika iframe gagal load
    var frame = document.getElementById('srikandi-frame');
    frame.addEventListener('error', function() {
      var statusEl = document.getElementById('loadingStatus');
      if (statusEl) {
        statusEl.innerText = "Gagal koneksi! Coba refresh...";
        statusEl.style.color = "#ff6b6b";
      }
      // Tetap hilangkan loader setelah 3 detik meskipun error
      setTimeout(function() {
        hideLoader();
      }, 3000);
    });
  </script>
  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.log('SW failed:', err));
    }
  </script>
</body>
</body>
</html>
