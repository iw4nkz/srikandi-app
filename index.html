<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <link rel="dns-prefetch" href="https://script.google.com">
  <link rel="preconnect" href="https://script.google.com">
  <link rel="preconnect" href="https://lh3.googleusercontent.com">
  <link rel="preconnect" href="https://i.ibb.co.com">
  
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://i.ibb.co.com/R4DSBf3N/pngwing-com.png">
  
  <title>SRIKANDI MONITORING UNIT</title>
  
  <link rel="preload" as="image" href="https://i.ibb.co.com/9kjkWdWp/icon-192.png" fetchpriority="high">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; 
      height: 100%; 
      background: #0a0a0a;
      overflow: hidden;
      overscroll-behavior-y: none;
    }
    .app-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
    }
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      opacity: 0;
      transition: opacity 0.5s ease;
      display: block;
      -webkit-overflow-scrolling: touch;
      overflow-y: auto;
    }
    iframe.visible { opacity: 1; }
    
    #loader-container {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      background: linear-gradient(145deg, #1a1a1a 0%, #141414 30%, #0d1a0d 70%, #0a0f0a 100%);
      transition: opacity 0.4s ease, visibility 0.4s;
    }
    #loader-container.hide {
      opacity: 0;
      visibility: hidden;
    }
    .loader-logo {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      animation: bounce 2s ease-in-out infinite;
    }
    .loader-logo img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(46, 204, 113, 0.2);
      border-radius: 50%;
      border-top-color: #2ecc71;
      animation: spin 1s ease-in-out infinite;
      margin-top: 20px;
    }
    .loading-text {
      color: #fff;
      margin-top: 20px;
      font-size: 1.1rem;
      letter-spacing: 3px;
      font-weight: bold;
    }
    .loading-subtext {
      color: #2ecc71;
      margin-top: 8px;
      font-size: 0.8rem;
      transition: color 0.3s ease;
    }
    .loading-dots span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #2ecc71;
      border-radius: 50%;
      margin: 0 3px;
      animation: dotBounce 1.4s infinite ease-in-out;
    }
    .loading-dots span:nth-child(1) { animation-delay: 0s; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes dotBounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; } 40% { transform: scale(1.2); opacity: 1; } }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div id="loader-container">
    <div class="loader-logo">
      <img src="https://i.ibb.co.com/R4DSBf3N/pngwing-com.png" alt="SRIKANDI" fetchpriority="high">
    </div>
    <div class="spinner"></div>
    <div class="loading-text">S R I K A N D I</div>
    <div class="loading-subtext" id="loadingStatus">Menghubungi server...</div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>

  <iframe 
    id="srikandi-frame" 
    src="https://script.google.com/macros/s/AKfycbzFAckE_xMlb9iT8D-MIeknriPNHlA6-YbAYCD_EAhXY_3DLmFah5mu7UJaAtaibBoG0w/exec"
    onload="handleIframeLoad()"
    onerror="handleIframeError()"
    allow="geolocation; microphone; camera; midi; encrypted-media"
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</div>

<script>
  (function() {
    let loaderHidden = false;
    let iframeLoadTimeout;
    const loadingTexts = [
      "Menghubungi server...", 
      "Memuat data terbaru...", 
      "Menyiapkan dashboard...", 
      "Hampir selesai...", 
      "Memuat Update Data..."
    ];
    let textIndex = 0;
    
    // Rotasi teks loading
    const textInterval = setInterval(() => {
      if (!loaderHidden) {
        textIndex = (textIndex + 1) % loadingTexts.length;
        const statusEl = document.getElementById('loadingStatus');
        if (statusEl) statusEl.innerText = loadingTexts[textIndex];
      }
    }, 2000);
    
    // Deteksi offline awal
    function updateOfflineStatus() {
      const statusEl = document.getElementById('loadingStatus');
      if (!statusEl) return;
      
      if (!navigator.onLine) {
        statusEl.innerText = "📡 Offline - Menunggu koneksi...";
        statusEl.style.color = "#ffaa44";
      } else {
        statusEl.innerText = loadingTexts[textIndex];
        statusEl.style.color = "#2ecc71";
      }
    }
    
    window.addEventListener('online', () => {
      updateOfflineStatus();
      setTimeout(() => location.reload(), 500);
    });
    
    window.addEventListener('offline', updateOfflineStatus);
    updateOfflineStatus();
    
    // Reload otomatis kalau iframe gagal load dalam 12 detik
    iframeLoadTimeout = setTimeout(() => {
      if (!loaderHidden) {
        console.log('⏳ Iframe terlalu lama, reload halaman...');
        location.reload();
      }
    }, 12000);
    
    function handleIframeLoad() {
      clearTimeout(iframeLoadTimeout);
      setTimeout(() => {
        if (!loaderHidden) hideLoader();
      }, 1200);
    }
    
    function handleIframeError() {
      if (loaderHidden) return;
      clearInterval(textInterval);
      clearTimeout(iframeLoadTimeout);
      const statusEl = document.getElementById('loadingStatus');
      if (statusEl) {
        statusEl.innerText = "⚠️ Gagal terhubung! Mencoba lagi...";
        statusEl.style.color = "#ff6b6b";
      }
      setTimeout(() => {
        if (!loaderHidden) location.reload();
      }, 3000);
    }
    
    function hideLoader() {
      if (loaderHidden) return;
      loaderHidden = true;
      clearInterval(textInterval);
      clearTimeout(iframeLoadTimeout);
      
      const loader = document.getElementById('loader-container');
      const frame = document.getElementById('srikandi-frame');
      
      if (loader) loader.classList.add('hide');
      if (frame) frame.classList.add('visible');
      
      setTimeout(() => {
        if (loader && loader.parentNode) loader.remove();
        window.scrollTo(0, 0);
      }, 500);
    }
    
    // Fallback safety (10 detik maksimal loading)
    setTimeout(() => {
      if (!loaderHidden) hideLoader();
    }, 10000);
  })();
</script>
</body>
</html>
