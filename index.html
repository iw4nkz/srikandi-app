<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <!-- KUNCI VIEWPORT: Mencegah zoom otomatis dan pergeseran layar saat input di HP -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- PWA Manifest & Theme -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>SRIKANDI MONITORING UNIT</title>
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/DzWsHG8J/pngwing-com.png">
  
  <style>
    /* RESET BASE: Mematikan paksa fitur pull-to-refresh browser */
    html, body { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      background-color: #050505;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      overscroll-behavior-y: none;
      position: fixed;
    }

    /* WRAPPER: Di HP jadi Full, di PC jadi kotak minimalis di tengah */
    .app-wrapper {
      width: 100%;
      height: 100%;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background-color: #0a0a0a;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    /* KONDISI PC / TABLET */
    @media (min-width: 768px) {
      body {
        background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        position: static; /* Lepas fixed agar bisa center di PC */
      }
      .app-wrapper {
        width: 100%;
        max-width: 480px; 
        height: 92vh;     
        border-radius: 16px;
        border: 4px solid #222;
      }
    }

    /* IFRAME STYLING */
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
      display: block;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    iframe.visible {
      opacity: 1;
    }

    /* LOADER CONTAINER */
    #loader-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      background: linear-gradient(145deg, #1a1a1a 0%, #141414 30%, #0d1a0d 70%, #0a0f0a 100%);
      transition: opacity 0.4s ease, visibility 0.4s;
    }

    #loader-container.hide {
      opacity: 0;
      visibility: hidden;
    }

    /* ANIMASI LOGO MANTUL */
    .loader-logo {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      animation: bounce 2s ease-in-out infinite;
    }

    .loader-logo img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }

    /* SPINNER RING */
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(46, 204, 113, 0.2);
      border-radius: 50%;
      border-top-color: #2ecc71;
      animation: spin 1s ease-in-out infinite;
      margin-top: 20px;
    }

    /* TYPOGRAPHY */
    .loading-text {
      color: #ffffff;
      margin-top: 20px;
      font-size: 1.1rem;
      letter-spacing: 3px;
      font-weight: bold;
    }

    .loading-subtext {
      color: #2ecc71;
      margin-top: 8px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .loading-dots span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #2ecc71;
      border-radius: 50%;
      margin: 0 3px;
      animation: dotBounce 1.4s infinite ease-in-out;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes dotBounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; } 40% { transform: scale(1.2); opacity: 1; } }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <!-- LAYER LOADER -->
    <div id="loader-container">
      <div class="loader-logo">
        <img src="https://i.postimg.cc/DzWsHG8J/pngwing-com.png" alt="Logo Srikandi" onerror="this.style.display='none'">
      </div>
      <div class="spinner"></div>
      <div class="loading-text">S R I K A N D I</div>
      <div class="loading-subtext" id="loadingStatus">Menghubungi server...</div>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- IFRAME UTAMA SRIKANDI (LINK GAS LU) -->
    <iframe 
      id="srikandi-frame" 
      src="https://script.google.com/macros/s/AKfycbxt9O2Xy9DDyLDFHEswyRgvR75fG_zlEfmB_Qvj-1GHXsRIrQXmQgtQg2BLKouszg9HCQ/exec"
      onload="handleIframeLoad()">
    </iframe>
  </div>

  <script>
    let loaderHidden = false;
    const loadingTexts = ["Menghubungi server...", "Memuat data terbaru...", "Menyiapkan dashboard...", "Hampir selesai..."];
    let textIndex = 0;
    
    // Rotasi teks loading
    const textInterval = setInterval(function() {
      if (!loaderHidden) {
        textIndex = (textIndex + 1) % loadingTexts.length;
        var statusEl = document.getElementById('loadingStatus');
        if (statusEl) statusEl.innerText = loadingTexts[textIndex];
      }
    }, 2000);
    
    function handleIframeLoad() {
      setTimeout(function() {
        if (!loaderHidden) hideLoader();
      }, 1500);
    }
    
    function hideLoader() {
      if (loaderHidden) return;
      loaderHidden = true;
      clearInterval(textInterval);
      
      var loader = document.getElementById('loader-container');
      var frame = document.getElementById('srikandi-frame');
      
      loader.classList.add('hide');
      frame.classList.add('visible');
      
      setTimeout(function() {
        if (loader) loader.remove();
        // Reset posisi layar ke (0,0) untuk jaga-jaga
        window.scrollTo(0, 0);
      }, 500);
    }
    
    // Fallback 10 detik jika koneksi lambat
    setTimeout(function() {
      if (!loaderHidden) hideLoader();
    }, 10000);
  </script>

  <!-- PWA SERVICE WORKER -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW failed:', err));
    }
  </script>
</body>
</html>
